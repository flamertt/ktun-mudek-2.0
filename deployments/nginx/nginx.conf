upstream portal_app  { server portal:80; }
upstream admin_app   { server mudek-admin:80; }
upstream teacher_app { server mudek-teacher:80; }
upstream student_app { server mudek-student:80; }
upstream api_app     { server api:8080; }

server {
    listen 80;
    server_name mude.ktun.edu.tr _;

    client_max_body_size 32m;

    # Ortak proxy header'ları
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Admin Paneli ---
    location /admin/ {
        proxy_pass http://admin_app/;
    }

    # --- Öğretmen Paneli ---
    location /teacher/ {
        proxy_pass http://teacher_app/;
    }

    # --- Öğrenci Paneli ---
    location /student/ {
        proxy_pass http://student_app/;
    }

    # --- Backend API ---
    location /api/ {
        proxy_pass         http://api_app/api/;
        proxy_read_timeout 120s;
        proxy_set_header   Authorization $http_authorization;
        proxy_pass_header  Authorization;
    }

    # --- Portal (ana sayfa) ---
    location / {
        proxy_pass http://portal_app/;
    }
}
